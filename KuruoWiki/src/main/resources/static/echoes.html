<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>声骸库 - KuroWiki</title>
    <link rel="stylesheet" href="css/common.css">
    <style>
        /* 页面特定样式 */
        
        /* 背景光圈 */
        #ambient-light {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 0;
            background: radial-gradient(
                600px circle at var(--mouse-x) var(--mouse-y),
                rgba(243, 156, 18, 0.08),
                transparent 50%
            );
            transition: background 0.1s ease;
        }

        /* 导航栏激活状态 */
        .top-nav a:nth-child(3) {
            color: var(--primary-color);
        }

        .top-nav a:nth-child(3)::after {
            width: 100%;
        }

        /* 标题 */
        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-top: 60px;
            margin-bottom: 15px;
            letter-spacing: 3px;
            font-weight: 300;
            font-size: 42px;
            position: relative;
            z-index: 10;
            text-shadow: 0 0 30px rgba(243, 156, 18, 0.3);
            animation: fadeInDown 0.6s ease-out;
        }

        .subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            letter-spacing: 2px;
            margin-bottom: 50px;
            position: relative;
            z-index: 10;
            animation: fadeInUp 0.6s ease-out 0.1s both;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 筛选控制台 */
        .filter-console {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 60px;
            flex-wrap: wrap;
            position: relative;
            z-index: 10;
            padding: 0 20px;
            animation: fadeInUp 0.6s ease-out 0.2s both;
        }

        .filter-select,
        #searchInput {
            padding: 10px 15px;
            background: rgba(25, 25, 25, 0.6);
            border: 1px solid var(--border-color);
            color: #fff;
            border-radius: 8px;
            outline: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            font-size: 14px;
        }

        .filter-select:hover,
        #searchInput:focus {
            border-color: var(--primary-color);
            background: rgba(25, 25, 25, 0.8);
            box-shadow: 0 0 20px rgba(243, 156, 18, 0.2);
        }

        #searchInput {
            width: 280px;
        }

        .filter-select {
            cursor: pointer;
            padding-right: 30px;
            width: 140px; /* 抵消 common.css 的全局 100% 宽度，恢复电脑端的固定宽度 */
        }

        .filter-select option {
            background: #1a1a1a;
            color: white;
        }

        /* 卡片容器 */
        .character-container {
            max-width: 1400px;
            margin: 0 auto 80px auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 40px;
            position: relative;
            z-index: 10;
        }

        /* 流光卡片 */
        .glow-card {
            height: 520px;
            border-radius: 16px;
            position: relative;
            background: rgba(255, 255, 255, 0.04);
            cursor: pointer;
            padding: 1px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.7);
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            animation: fadeInUp 0.6s ease-out both;
        }

        .glow-card:nth-child(1) { animation-delay: 0.3s; }
        .glow-card:nth-child(2) { animation-delay: 0.35s; }
        .glow-card:nth-child(3) { animation-delay: 0.4s; }
        .glow-card:nth-child(n+4) { animation-delay: 0.45s; }

        .glow-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 35px 70px rgba(0, 0, 0, 0.8);
        }

        .glow-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(
                800px circle at var(--card-mouse-x) var(--card-mouse-y),
                var(--elem-color),
                transparent 60%
            );
            opacity: 0;
            transition: opacity 0.4s ease-out;
            z-index: 0;
        }

        .character-container:hover .glow-card::before {
            opacity: 1;
        }

        .glow-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            background: var(--bg-card);
            border-radius: 15px;
            z-index: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .glow-card-inner::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(
                500px circle at var(--card-mouse-x) var(--card-mouse-y),
                rgba(255, 255, 255, 0.06),
                transparent 45%
            );
            z-index: 5;
            pointer-events: none;
        }

        .card-img-box {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            overflow: hidden;
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center;
            transition: transform 0.6s ease;
        }

        .glow-card:hover .card-img {
            transform: scale(1.08);
        }

        .card-info {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 48%;
            padding: 35px 20px 20px 20px;
            z-index: 10;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.98) 0%, rgba(0, 0, 0, 0.75) 45%, transparent 100%);
        }

        .card-name {
            font-size: 28px;
            font-weight: bold;
            margin: 0 0 10px 0;
            color: #fff;
            text-shadow: 0 3px 15px rgba(0, 0, 0, 1);
        }

        .tag {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 12px;
            margin-right: 8px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .tag:hover {
            border-color: var(--primary-color);
            background: rgba(243, 156, 18, 0.1);
        }

        .desc {
            font-size: 13px;
            color: #ccc;
            line-height: 1.6;
            margin-top: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.9);
        }

        /* 返回顶部按钮 */
        #backToTop {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(243, 156, 18, 0.3) 0%, rgba(230, 126, 34, 0.2) 100%);
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
            font-size: 20px;
            cursor: pointer;
            display: none;
            z-index: 1000;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(243, 156, 18, 0.2);
        }

        #backToTop:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(243, 156, 18, 0.4);
            background: linear-gradient(135deg, rgba(243, 156, 18, 0.5) 0%, rgba(230, 126, 34, 0.3) 100%);
        }

        /* 加载提示 */
        .loading-text {
            text-align: center;
            color: #666;
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .character-container {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 25px;
            }

            h1 {
                font-size: 32px;
                margin-top: 40px;
            }

            .filter-console {
                flex-direction: column;
                gap: 12px;
            }

            #searchInput {
                width: 100%;
            }

            .filter-select {
                width: 100%;
            }

            #backToTop {
                bottom: 20px;
                right: 20px;
                width: 45px;
                height: 45px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

<div id="ambient-light"></div>

<nav class="top-nav">
    <a href="index.html">✦ 角色库</a>
    <a href="weapons.html">⚔️ 武器库</a>
    <a href="echoes.html">🔮 声骸库</a>
    <a href="strategies.html">📚 攻略中心</a>
</nav>

<div id="userBar">
    <a href="login.html" style="color: var(--primary-color); text-decoration: none; font-weight: bold;">🔑 漂泊者登录</a>
</div>

<h1>🔮 声骸库 🔮</h1>
<p class="subtitle">探索神秘的声骸力量</p>

<div class="filter-console">
    <input type="text" id="searchInput" placeholder="🔍 输入声骸名称进行检索...">
    <select id="elementFilter" class="filter-select">
        <option value="全部">✦ 全部合鸣</option>
        <option value="沉日劫明">沉日劫明</option>
        <option value="凝夜白霜">凝夜白霜</option>
        <option value="彻空冥雷">彻空冥雷</option>
        <option value="熔山裂谷">熔山裂谷</option>
        <option value="啸谷长风">啸谷长风</option>
    </select>
    <select id="rarityFilter" class="filter-select">
        <option value="0">✦ 全部COST</option>
        <option value="4">COST 4</option>
        <option value="3">COST 3</option>
        <option value="1">COST 1</option>
    </select>
</div>

<div class="character-container" id="charList">
    <p class="loading-text">正在同步终端数据...</p>
</div>

<button id="backToTop" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">▲</button>

<script src="js/common.js"></script>
<script>
    let allCharacters = [];

    const elementColors = {
        '衍射': 'rgba(255, 215, 0, 0.7)',
        '导电': 'rgba(191, 85, 236, 0.7)',
        '气动': 'rgba(0, 255, 127, 0.7)',
        '冷凝': 'rgba(0, 191, 255, 0.7)',
        '热熔': 'rgba(255, 69, 0, 0.7)',
        '湮灭': 'rgba(255, 20, 147, 0.7)'
    };

    // 节流函数
    function throttle(func, limit) {
        let inThrottle;
        return function() {
            const args = arguments;
            const context = this;
            if (!inThrottle) {
                func.apply(context, args);
                inThrottle = true;
                setTimeout(() => inThrottle = false, limit);
            }
        }
    }

    // 优化后的鼠标移动事件
    const throttledMouseMove = throttle((e) => {
        const ambient = document.getElementById('ambient-light');
        if (ambient) {
            ambient.style.setProperty('--mouse-x', `${e.clientX}px`);
            ambient.style.setProperty('--mouse-y', `${e.clientY}px`);
        }
    }, 16);

    const throttledCardMouseMove = throttle((e) => {
        const cards = document.querySelectorAll('.glow-card');
        cards.forEach(card => {
            const rect = card.getBoundingClientRect();
            card.style.setProperty('--card-mouse-x', `${e.clientX - rect.left}px`);
            card.style.setProperty('--card-mouse-y', `${e.clientY - rect.top}px`);
        });
    }, 16);

    window.addEventListener('mousemove', throttledMouseMove);

    const charList = document.getElementById('charList');
    if (charList) {
        charList.addEventListener('mousemove', throttledCardMouseMove);
    }

    async function loadCharacters() {
        try {
            const response = await fetch('/api/echoes');
            const result = await response.json();
            if (result.code === 200) {
                allCharacters = result.data;
                renderCards(allCharacters);
            }
        } catch (e) { 
            console.error('声骸加载失败:', e); 
        }
    }

    function renderCards(dataList) {
        const listDiv = document.getElementById('charList');
        listDiv.innerHTML = '';
        if (dataList.length === 0) {
            listDiv.innerHTML = '<p class="loading-text">未找到匹配的声骸</p>';
            return;
        }
        dataList.forEach(echo => {
            const card = document.createElement('div');
            card.className = 'glow-card';
            const glowColor = 'rgba(147, 112, 219, 0.7)'; // 声骸使用紫色
            card.style.setProperty('--elem-color', glowColor);

            card.onclick = () => {}; // 声骸暂无详情页
            
            const cardInner = document.createElement('div');
            cardInner.className = 'glow-card-inner';
            
            const imgBox = document.createElement('div');
            imgBox.className = 'card-img-box';
            
            const img = document.createElement('img');
            img.src = echo.imageUrl || 'images/default.jpg';
            img.className = 'card-img';
            img.alt = echo.name;
            img.onerror = function() { this.src = 'images/default.jpg'; };
            
            imgBox.appendChild(img);
            
            const cardInfo = document.createElement('div');
            cardInfo.className = 'card-info';
            
            const cardName = document.createElement('p');
            cardName.className = 'card-name';
            cardName.textContent = echo.name;
            
            const tagsDiv = document.createElement('div');
            
            const costTag = document.createElement('span');
            costTag.className = 'tag';
            costTag.style.color = '#3498db';
            costTag.style.borderColor = '#3498db';
            costTag.textContent = `COST ${echo.cost}`;
            
            const sonataTag = document.createElement('span');
            sonataTag.className = 'tag';
            sonataTag.style.color = glowColor.replace('0.7', '1');
            sonataTag.style.borderColor = glowColor.replace('0.7', '0.5');
            sonataTag.textContent = echo.sonataEffect || '未知合鸣';
            
            tagsDiv.appendChild(costTag);
            tagsDiv.appendChild(sonataTag);
            
            const desc = document.createElement('p');
            desc.className = 'desc';
            desc.textContent = echo.skillDesc || '暂无描述';
            
            cardInfo.appendChild(cardName);
            cardInfo.appendChild(tagsDiv);
            cardInfo.appendChild(desc);
            
            cardInner.appendChild(imgBox);
            cardInner.appendChild(cardInfo);
            card.appendChild(cardInner);
            
            listDiv.appendChild(card);
        });
    }

    function applyFilters() {
        const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
        const element = document.getElementById('elementFilter').value;
        const rarity = document.getElementById('rarityFilter').value;

        const filtered = allCharacters.filter(echo => {
            const matchKeyword = echo.name.toLowerCase().includes(keyword) || (echo.sonataEffect && echo.sonataEffect.includes(keyword));
            const matchElement = (element === '全部' || element === '✦ 全部合鸣') || (echo.sonataEffect === element);
            const matchRarity = (rarity === '0' || rarity === '✦ 全部COST') || (echo.cost == rarity);
            return matchKeyword && matchElement && matchRarity;
        });
        renderCards(filtered);
    }

    document.getElementById('searchInput').addEventListener('input', applyFilters);
    document.getElementById('elementFilter').addEventListener('change', applyFilters);
    document.getElementById('rarityFilter').addEventListener('change', applyFilters);

    window.addEventListener('scroll', () => {
        document.getElementById('backToTop').style.display = window.scrollY > 300 ? 'block' : 'none';
    });

    // 立即执行初始化
    (async function init() {
        const user = await checkLogin();
        updateUserBar(user);
        await loadCharacters();
    })();
</script>
</body>
</html>
