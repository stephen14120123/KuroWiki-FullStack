<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漂泊者登录 - KuroWiki</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2e 50%, #0f0f1e 100%);
            color: white;
            font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* 背景动画 - 粒子效果 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(243, 156, 18, 0.5);
            border-radius: 50%;
            animation: float 20s infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(100px);
                opacity: 0;
            }
        }

        /* 背景光圈 */
        .glow-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(243, 156, 18, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }

        /* 登录容器 */
        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        /* 玻璃态卡片 */
        .login-box {
            background: rgba(22, 22, 22, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(243, 156, 18, 0.2);
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3),
                        inset 0 1px 1px rgba(255, 255, 255, 0.1);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 标题 */
        .login-title {
            text-align: center;
            margin-bottom: 10px;
        }

        .login-title h1 {
            font-size: 32px;
            font-weight: 300;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
        }

        .login-title p {
            font-size: 13px;
            color: #999;
            letter-spacing: 1px;
        }

        /* 分割线 */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(243, 156, 18, 0.3), transparent);
            margin: 30px 0;
        }

        /* 表单组 */
        .form-group {
            margin-bottom: 20px;
            animation: fadeIn 0.6s ease-out forwards;
            opacity: 0;
        }

        .form-group:nth-child(3) { animation-delay: 0.1s; }
        .form-group:nth-child(4) { animation-delay: 0.2s; }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 输入框 */
        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            font-size: 14px;
            transition: all 0.3s ease;
            position: relative;
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .form-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(243, 156, 18, 0.5);
            box-shadow: 0 0 20px rgba(243, 156, 18, 0.2),
                        inset 0 0 10px rgba(243, 156, 18, 0.05);
        }

        /* 按钮 */
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin-top: 10px;
            animation: fadeIn 0.6s ease-out 0.3s forwards;
            opacity: 0;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.3s ease;
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(243, 156, 18, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        /* 底部链接 */
        .login-footer {
            text-align: center;
            margin-top: 25px;
            font-size: 13px;
            color: #999;
            animation: fadeIn 0.6s ease-out 0.4s forwards;
            opacity: 0;
        }

        .login-footer a {
            color: #f39c12;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .login-footer a:hover {
            color: #e67e22;
            text-decoration: underline;
        }

        /* 响应式设计 */
        @media (max-width: 480px) {
            .login-box {
                padding: 40px 25px;
            }

            .login-title h1 {
                font-size: 26px;
            }

            .form-input,
            .login-btn {
                font-size: 14px;
                padding: 12px 14px;
            }
        }
    </style>
</head>
<body>
    <!-- 背景粒子 -->
    <div class="particles" id="particles"></div>
    
    <!-- 背景光圈 -->
    <div class="glow-bg"></div>

    <!-- 登录容器 -->
    <div class="login-container">
        <div class="login-box">
            <div class="login-title">
                <h1>KuroWiki</h1>
                <p>终端身份验证系统</p>
            </div>

            <div class="divider"></div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <input 
                        type="text" 
                        id="username" 
                        class="form-input" 
                        placeholder="🔐 通行证账号"
                        required
                    >
                </div>

                <div class="form-group">
                    <input 
                        type="password" 
                        id="password" 
                        class="form-input" 
                        placeholder="🔑 验证密码"
                        required
                    >
                </div>

                <button type="submit" class="login-btn">同步档案</button>
            </form>

            <div class="login-footer">
                <p>首次访问？<a href="javascript:void(0)">创建新账号</a></p>
            </div>
        </div>
    </div>

    <script>
        // 生成粒子背景
        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 50;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDuration = (Math.random() * 10 + 15) + 's';
                particle.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(particle);
            }
        }

        // 处理登录
        async function handleLogin(event) {
            event.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const btn = event.target.querySelector('.login-btn');

            // 按钮加载状态
            const originalText = btn.textContent;
            btn.textContent = '验证中...';
            btn.disabled = true;

            try {
                const params = new URLSearchParams();
                params.append('username', username);
                params.append('password', password);

                const response = await fetch('/api/user/login', {
                    method: 'POST',
                    body: params
                });

                const result = await response.json();

                if (result.code === 200) {
                    localStorage.setItem('jwt_token', result.data.token);
                    
                    // 成功动画
                    btn.textContent = '✓ 验证成功';
                    btn.style.background = 'linear-gradient(135deg, #27ae60 0%, #229954 100%)';
                    
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 800);
                } else {
                    showError(result.message || '身份验证失败，请检查账号密码。');
                    btn.textContent = originalText;
                    btn.disabled = false;
                }
            } catch (error) {
                console.error('登录异常', error);
                showError('终端连接异常，请检查网络！');
                btn.textContent = originalText;
                btn.disabled = false;
            }
        }

        // 显示错误提示
        function showError(message) {
            const errorDiv = document.createElement('div');
            errorDiv.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: rgba(231, 76, 60, 0.9);
                color: white;
                padding: 15px 20px;
                border-radius: 10px;
                border-left: 4px solid #e74c3c;
                backdrop-filter: blur(10px);
                z-index: 1000;
                animation: slideIn 0.3s ease-out;
            `;
            errorDiv.textContent = message;
            document.body.appendChild(errorDiv);

            setTimeout(() => {
                errorDiv.style.animation = 'slideOut 0.3s ease-out';
                setTimeout(() => errorDiv.remove(), 300);
            }, 3000);
        }

        // 添加动画样式
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from {
                    transform: translateX(400px);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }
            @keyframes slideOut {
                from {
                    transform: translateX(0);
                    opacity: 1;
                }
                to {
                    transform: translateX(400px);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);

        // 初始化
        createParticles();
    </script>
</body>
</html>
