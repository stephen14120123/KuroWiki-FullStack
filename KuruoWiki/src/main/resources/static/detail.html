<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>共鸣者档案详情</title>
    <!-- ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <!-- Three.js Core -->
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <!-- OrbitControls -->
    <script src="https://unpkg.com/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        :root {
            --primary-color: #f39c12;
            --primary-dark: #e67e22;
            --bg-dark: #0a0a0a;
            --bg-card: #0d0d0d;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #030303 0%, #0a0a1a 50%, #030303 100%);
            color: #e0e0e0;
            font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .back-btn {
            position: fixed;
            top: 30px;
            left: 30px;
            color: var(--primary-color);
            text-decoration: none;
            font-size: 18px;
            z-index: 100;
            padding: 10px 15px;
            background: rgba(30, 30, 30, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .back-btn:hover {
            background: rgba(30, 30, 30, 0.8);
            border-color: var(--primary-color);
            transform: translateX(-5px);
        }

        .container {
            width: 100%;
            max-width: 1200px;
            background: rgba(22, 22, 22, 0.5);
            border-radius: 20px;
            display: flex;
            overflow: hidden;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            margin: 0 auto;
            backdrop-filter: blur(10px);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 左侧：3D展示区域 */
        .left-panel {
            flex: 1;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.9) 0%, rgba(20, 20, 30, 0.8) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 1px solid var(--border-color);
            min-height: 600px;
            position: relative;
            overflow: hidden;
        }

        .left-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at center, rgba(243, 156, 18, 0.15) 0%, transparent 70%);
            pointer-events: none;
            z-index: 1;
        }

        /* Three.js Canvas */
        #threeCanvas {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
        }

        /* 2D立绘图片（备用） */
        #charImg {
            width: 100%;
            height: 100%;
            object-fit: contain;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            animation: fadeIn 0.6s ease-out;
            display: none; /* 默认隐藏，使用3D场景 */
        }

        #charImg.show {
            display: block;
        }

        /* 3D加载提示 */
        .loading-3d {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--primary-color);
            font-size: 14px;
            z-index: 3;
            text-align: center;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* 3D控制提示 */
        .control-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            color: #999;
            z-index: 3;
            border: 1px solid rgba(243, 156, 18, 0.2);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 右侧：档案信息 */
        .right-panel {
            flex: 1.2;
            padding: 50px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            max-height: 90vh;
        }

        .right-panel::-webkit-scrollbar {
            width: 6px;
        }

        .right-panel::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .right-panel::-webkit-scrollbar-thumb {
            background: rgba(243, 156, 18, 0.3);
            border-radius: 10px;
        }

        .right-panel::-webkit-scrollbar-thumb:hover {
            background: rgba(243, 156, 18, 0.5);
        }

        /* 标题区域 */
        .header {
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 20px;
            margin-bottom: 30px;
            animation: fadeInDown 0.6s ease-out 0.1s both;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .name {
            font-size: 42px;
            font-weight: bold;
            margin: 0 0 15px 0;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tags {
            margin-top: 12px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .tag {
            padding: 6px 14px;
            border-radius: 8px;
            background: rgba(243, 156, 18, 0.1);
            border: 1px solid rgba(243, 156, 18, 0.3);
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .tag:hover {
            background: rgba(243, 156, 18, 0.2);
            border-color: var(--primary-color);
            transform: translateY(-2px);
        }

        /* 描述 */
        .description {
            line-height: 1.8;
            color: #aaa;
            margin-bottom: 35px;
            font-size: 14px;
            animation: fadeInUp 0.6s ease-out 0.2s both;
        }

        /* 雷达图 */
        #radarChart {
            width: 100%;
            height: 350px;
            margin-bottom: 40px;
            animation: fadeInUp 0.6s ease-out 0.3s both;
        }

        /* 攻略区域 */
        .strategies-section {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid var(--border-color);
            animation: fadeInUp 0.6s ease-out 0.4s both;
        }

        .section-title {
            color: var(--primary-color);
            border-left: 4px solid var(--primary-color);
            padding-left: 15px;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        #strategyList {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .strategy-card {
            background: rgba(30, 30, 30, 0.6);
            padding: 18px;
            border-radius: 12px;
            border-left: 4px solid var(--primary-color);
            transition: all 0.3s ease;
            border: 1px solid var(--border-color);
        }

        .strategy-card:hover {
            background: rgba(30, 30, 30, 0.8);
            border-color: var(--primary-color);
            transform: translateX(5px);
            box-shadow: 0 5px 20px rgba(243, 156, 18, 0.1);
        }

        .strategy-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .strategy-title {
            color: var(--primary-color);
            font-size: 16px;
            font-weight: bold;
            flex: 1;
        }

        .strategy-meta {
            font-size: 12px;
            color: #666;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .strategy-delete {
            color: #e74c3c;
            cursor: pointer;
            text-decoration: none;
            font-size: 12px;
            transition: color 0.3s ease;
        }

        .strategy-delete:hover {
            color: #c0392b;
            text-decoration: underline;
        }

        .strategy-content {
            color: #ccc;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .empty-state {
            text-align: center;
            color: #666;
            padding: 30px;
            font-size: 14px;
        }

        /* 发布表单 */
        .post-section {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid var(--border-color);
            animation: fadeInUp 0.6s ease-out 0.5s both;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--primary-color);
            font-weight: bold;
        }

        #postTitle,
        #postContent {
            width: 100%;
            padding: 12px 15px;
            background: rgba(25, 25, 25, 0.6);
            border: 1px solid var(--border-color);
            color: #fff;
            border-radius: 10px;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s ease;
            resize: vertical;
        }

        #postTitle:focus,
        #postContent:focus {
            outline: none;
            border-color: var(--primary-color);
            background: rgba(25, 25, 25, 0.8);
            box-shadow: 0 0 20px rgba(243, 156, 18, 0.2);
        }

        #postContent {
            min-height: 120px;
        }

        .submit-btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(243, 156, 18, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        /* 响应式设计 */
        @media (max-width: 1024px) {
            .container {
                flex-direction: column;
            }

            .left-panel {
                min-height: 400px;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }

            .right-panel {
                padding: 40px;
                max-height: none;
            }

            .name {
                font-size: 32px;
            }
        }

        @media (max-width: 768px) {
            .back-btn {
                top: 15px;
                left: 15px;
                font-size: 16px;
                padding: 8px 12px;
            }

            .right-panel {
                padding: 25px;
            }

            .name {
                font-size: 26px;
            }

            #radarChart {
                height: 280px;
            }

            .strategy-header {
                flex-direction: column;
                gap: 10px;
            }

            .strategy-meta {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

<a href="index.html" class="back-btn">← 返回图鉴</a>

<div class="container">
    <div class="left-panel">
        <!-- Three.js 3D Canvas -->
        <canvas id="threeCanvas"></canvas>
        <!-- 2D立绘备用 -->
        <img id="charImg" src="" alt="">
        <!-- 加载提示 -->
        <div class="loading-3d" id="loading3d">
            <div>🌟 初始化3D场景...</div>
        </div>
        <!-- 控制提示 -->
        <div class="control-hint">
            🖱️ 拖拽旋转 | 滚轮缩放
        </div>
    </div>
    <div class="right-panel">
        <div class="header">
            <p id="charName" class="name">加载中...</p>
            <div class="tags">
                <span id="charRarity" class="tag"></span>
                <span id="charElement" class="tag"></span>
            </div>
        </div>
        <p id="charDesc" class="description"></p>

        <div id="radarChart"></div>

        <div class="strategies-section">
            <h3 class="section-title">📚 档案库攻略记录</h3>
            <div id="strategyList"></div>
        </div>

        <div class="post-section">
            <h3 class="section-title">✍️ 撰写共鸣攻略</h3>
            <div class="form-group">
                <label class="form-label">攻略标题</label>
                <input 
                    type="text" 
                    id="postTitle" 
                    placeholder="请输入标题 (如：声骸搭配心得)"
                >
            </div>
            <div class="form-group">
                <label class="form-label">攻略内容</label>
                <textarea 
                    id="postContent" 
                    placeholder="在此输入你的实战建议..."
                ></textarea>
            </div>
            <button class="submit-btn" onclick="submitPost()">🚀 发布档案</button>
        </div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const charId = urlParams.get('id');

    async function fetchDetail() {
        try {
            const response = await fetch(`/api/characters/${charId}`);
            const result = await response.json();

            if (result.code === 200) {
                const data = result.data;
                document.getElementById('charName').innerText = data.name;
                document.getElementById('charRarity').innerText = `⭐ ${data.rarity}星`;
                document.getElementById('charElement').innerText = data.element;
                document.getElementById('charDesc').innerText = data.description;
                document.getElementById('charImg').src = data.imageUrl;
                initRadar(data);
            } else {
                alert("档案读取失败: " + result.message);
            }
        } catch (err) {
            console.error("加载详情失败", err);
        }
    }

    async function loadStrategies() {
        try {
            const response = await fetch(`/api/strategies?characterId=${charId}`);
            const result = await response.json();

            if (result.code === 200) {
                const list = result.data;
                const listDiv = document.getElementById('strategyList');
                
                if (list.length === 0) {
                    listDiv.innerHTML = '<div class="empty-state">暂无攻略记录，快来抢首发！</div>';
                    return;
                }

                listDiv.innerHTML = '';
                list.forEach(item => {
                    const date = new Date(item.createTime).toLocaleString();
                    const card = document.createElement('div');
                    card.className = 'strategy-card';
                    
                    // 创建标题元素
                    const titleDiv = document.createElement('div');
                    titleDiv.className = 'strategy-title';
                    titleDiv.textContent = item.title; // 使用textContent防止XSS
                    
                    // 创建作者和时间信息
                    const authorSpan = document.createElement('span');
                    authorSpan.textContent = '👤 ' + item.authorName;
                    
                    const dateSpan = document.createElement('span');
                    dateSpan.textContent = '📅 ' + date;
                    
                    const deleteLink = document.createElement('a');
                    deleteLink.href = 'javascript:void(0)';
                    deleteLink.className = 'strategy-delete';
                    deleteLink.textContent = '[删除]';
                    deleteLink.onclick = () => confirmDelete(item.id);
                    
                    const metaDiv = document.createElement('div');
                    metaDiv.className = 'strategy-meta';
                    metaDiv.appendChild(authorSpan);
                    metaDiv.appendChild(dateSpan);
                    metaDiv.appendChild(deleteLink);
                    
                    const headerDiv = document.createElement('div');
                    headerDiv.className = 'strategy-header';
                    headerDiv.appendChild(titleDiv);
                    headerDiv.appendChild(metaDiv);
                    
                    // 创建内容元素
                    const contentP = document.createElement('p');
                    contentP.className = 'strategy-content';
                    contentP.textContent = item.content; // 使用textContent防止XSS
                    
                    card.appendChild(headerDiv);
                    card.appendChild(contentP);
                    listDiv.appendChild(card);
                });
            }
        } catch (err) {
            console.error("加载攻略失败", err);
        }
    }

    async function confirmDelete(id) {
        if (!confirm("确定要从档案库中永久抹除这条记录吗？")) return;

        const token = localStorage.getItem('jwt_token');
        if (!token) {
            showNotification("⚠️ 权限验证失败，请先登录！", "error");
            setTimeout(() => window.location.href = 'login.html', 1500);
            return;
        }

        try {
            const response = await fetch(`/api/strategies/${id}`, {
                method: 'DELETE',
                headers: {
                    'Authorization': 'Bearer ' + token
                }
            });
            
            if (response.status === 401) {
                localStorage.removeItem('jwt_token');
                showNotification("登录已过期，请重新登录", "error");
                setTimeout(() => window.location.href = 'login.html', 1500);
                return;
            }
            
            const result = await response.json();

            if (result.code === 200) {
                showNotification("💥 抹除成功！", "success");
                loadStrategies();
            } else {
                showNotification(result.message, "error");
            }
        } catch (err) {
            console.error("删除出错", err);
            showNotification("删除失败，请重试", "error");
        }
    }

    async function submitPost() {
        const title = document.getElementById('postTitle').value;
        const content = document.getElementById('postContent').value;
        const token = localStorage.getItem('jwt_token');

        if (!token) {
            showNotification("⚠️ 请先进行身份验证！", "error");
            setTimeout(() => window.location.href = 'login.html', 1500);
            return;
        }

        if(!title || !content) {
            showNotification("标题和内容不能为空！", "error");
            return;
        }

        const data = {
            characterId: parseInt(charId),
            title: title,
            content: content
        };

        try {
            const response = await fetch('/api/strategies', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify(data)
            });

            if (response.status === 401) {
                localStorage.removeItem('jwt_token');
                showNotification("登录已过期，请重新登录", "error");
                setTimeout(() => window.location.href = 'login.html', 1500);
                return;
            }

            const result = await response.json();
            if(result.code === 200) {
                showNotification("🎉 档案同步成功！", "success");
                document.getElementById('postTitle').value = '';
                document.getElementById('postContent').value = '';
                loadStrategies();
            } else {
                showNotification(result.message, "error");
            }
        } catch (err) {
            console.error("网络异常", err);
            showNotification("网络异常，请重试", "error");
        }
    }

    function showNotification(message, type = 'info') {
        const notif = document.createElement('div');
        notif.style.cssText = `
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
            border-left: 4px solid ${type === 'success' ? '#27ae60' : type === 'error' ? '#e74c3c' : '#f39c12'};
            background: ${type === 'success' ? 'rgba(39, 174, 96, 0.9)' : type === 'error' ? 'rgba(231, 76, 60, 0.9)' : 'rgba(243, 156, 18, 0.9)'};
            color: white;
        `;
        notif.textContent = message;
        document.body.appendChild(notif);

        setTimeout(() => {
            notif.style.animation = 'slideOut 0.3s ease-out';
            setTimeout(() => notif.remove(), 300);
        }, 3000);
    }

    function initRadar(data) {
        const chartDom = document.getElementById('radarChart');
        const myChart = echarts.init(chartDom, 'dark');
        
        const option = {
            backgroundColor: 'transparent',
            title: {
                text: '⚡ 能力评估雷达',
                left: 'center',
                top: 10,
                textStyle: {
                    color: '#f39c12',
                    fontSize: 16,
                    fontWeight: 'bold'
                }
            },
            tooltip: {
                trigger: 'item',
                backgroundColor: 'rgba(0, 0, 0, 0.8)',
                borderColor: '#f39c12',
                borderWidth: 1,
                textStyle: {
                    color: '#fff'
                }
            },
            radar: {
                center: ['50%', '55%'],
                radius: '65%',
                indicator: [
                    { name: '生命值', max: 100 },
                    { name: '共鸣效率', max: 100 },
                    { name: '暴击率', max: 100 },
                    { name: '防御力', max: 100 },
                    { name: '攻击力', max: 100 }
                ],
                shape: 'polygon',
                splitArea: {
                    show: true,
                    areaStyle: {
                        color: [
                            'rgba(243, 156, 18, 0.05)',
                            'rgba(243, 156, 18, 0.1)',
                            'rgba(243, 156, 18, 0.15)',
                            'rgba(243, 156, 18, 0.2)',
                            'rgba(243, 156, 18, 0.25)'
                        ]
                    }
                },
                axisLine: {
                    lineStyle: {
                        color: 'rgba(243, 156, 18, 0.4)',
                        width: 2
                    }
                },
                splitLine: {
                    lineStyle: {
                        color: 'rgba(243, 156, 18, 0.3)',
                        width: 2
                    }
                },
                name: {
                    textStyle: {
                        color: '#f39c12',
                        fontSize: 13,
                        fontWeight: 'bold',
                        backgroundColor: 'rgba(0, 0, 0, 0.5)',
                        padding: [3, 8],
                        borderRadius: 4
                    }
                }
            },
            series: [{
                type: 'radar',
                symbol: 'circle',
                symbolSize: 8,
                data: [{
                    value: [data.hp, data.energy, data.crit, data.def, data.atk],
                    name: '能力评估',
                    areaStyle: {
                        color: {
                            type: 'radial',
                            x: 0.5,
                            y: 0.5,
                            r: 0.5,
                            colorStops: [
                                { offset: 0, color: 'rgba(243, 156, 18, 0.6)' },
                                { offset: 0.5, color: 'rgba(243, 156, 18, 0.4)' },
                                { offset: 1, color: 'rgba(243, 156, 18, 0.2)' }
                            ]
                        },
                        shadowBlur: 20,
                        shadowColor: 'rgba(243, 156, 18, 0.8)',
                        shadowOffsetX: 0,
                        shadowOffsetY: 0
                    },
                    lineStyle: {
                        color: '#f39c12',
                        width: 3,
                        shadowBlur: 10,
                        shadowColor: 'rgba(243, 156, 18, 1)'
                    },
                    itemStyle: {
                        color: '#f39c12',
                        borderColor: '#fff',
                        borderWidth: 2,
                        shadowBlur: 15,
                        shadowColor: 'rgba(243, 156, 18, 1)'
                    },
                    label: {
                        show: true,
                        formatter: function(params) {
                            return params.value;
                        },
                        color: '#fff',
                        fontSize: 11,
                        fontWeight: 'bold',
                        backgroundColor: 'rgba(243, 156, 18, 0.8)',
                        padding: [2, 6],
                        borderRadius: 3
                    }
                }],
                animation: true,
                animationDuration: 2000,
                animationEasing: 'elasticOut'
            }]
        };

        myChart.setOption(option);

        // 呼吸动画效果
        let breathePhase = 0;
        setInterval(() => {
            breathePhase += 0.05;
            const opacity = 0.4 + Math.sin(breathePhase) * 0.2;
            
            myChart.setOption({
                series: [{
                    areaStyle: {
                        color: {
                            type: 'radial',
                            x: 0.5,
                            y: 0.5,
                            r: 0.5,
                            colorStops: [
                                { offset: 0, color: `rgba(243, 156, 18, ${opacity + 0.2})` },
                                { offset: 0.5, color: `rgba(243, 156, 18, ${opacity})` },
                                { offset: 1, color: `rgba(243, 156, 18, ${opacity - 0.2})` }
                            ]
                        }
                    }
                }]
            });
        }, 100);

        window.addEventListener('resize', () => myChart.resize());
    }

    // ==========================================
    // Three.js 3D 场景初始化
    // ==========================================
    let scene, camera, renderer, controls, mesh;
    let animationId;

    function init3DScene() {
        try {
            const container = document.getElementById('threeCanvas');
            const width = container.parentElement.clientWidth;
            const height = container.parentElement.clientHeight;

            // 创建场景
            scene = new THREE.Scene();
            scene.background = null;

            // 创建相机
            camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
            camera.position.set(0, 0, 5);

            // 创建渲染器
            renderer = new THREE.WebGLRenderer({
                canvas: container,
                alpha: true,
                antialias: true
            });
            renderer.setSize(width, height);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;

            // 添加环境光
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            // 添加主光源（橙色调）
            const directionalLight = new THREE.DirectionalLight(0xf39c12, 1.5);
            directionalLight.position.set(5, 5, 5);
            directionalLight.castShadow = true;
            scene.add(directionalLight);

            // 添加辅助光源（蓝色调）
            const backLight = new THREE.DirectionalLight(0x3498db, 0.8);
            backLight.position.set(-5, 3, -5);
            scene.add(backLight);

            // 添加点光源（发光效果）
            const pointLight = new THREE.PointLight(0xf39c12, 1, 100);
            pointLight.position.set(0, 2, 3);
            scene.add(pointLight);

            // 创建占位几何体 - 发光菱形
            const geometry = new THREE.OctahedronGeometry(1.5, 0);
            
            const material = new THREE.MeshPhysicalMaterial({
                color: 0xf39c12,
                emissive: 0xf39c12,
                emissiveIntensity: 0.5,
                metalness: 0.8,
                roughness: 0.2,
                transparent: true,
                opacity: 0.9,
                side: THREE.DoubleSide
            });

            mesh = new THREE.Mesh(geometry, material);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);

            // 添加线框效果
            const wireframe = new THREE.WireframeGeometry(geometry);
            const lineMaterial = new THREE.LineBasicMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.3
            });
            const line = new THREE.LineSegments(wireframe, lineMaterial);
            mesh.add(line);

            // 添加粒子环绕效果
            createParticleRing();

            // 添加轨道控制器
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.enableZoom = true;
            controls.enablePan = false;
            controls.minDistance = 3;
            controls.maxDistance = 10;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 1.0;

            // 隐藏加载提示
            setTimeout(() => {
                const loading = document.getElementById('loading3d');
                if (loading) loading.style.display = 'none';
            }, 1000);

            // 开始动画循环
            animate();

            // 响应窗口大小变化
            window.addEventListener('resize', onWindowResize);
        } catch (error) {
            console.error('3D场景初始化失败:', error);
            // 如果3D初始化失败，显示2D立绘
            document.getElementById('charImg').classList.add('show');
            document.getElementById('loading3d').style.display = 'none';
        }
    }

    function createParticleRing() {
        const particlesGeometry = new THREE.BufferGeometry();
        const particleCount = 100;
        const positions = new Float32Array(particleCount * 3);

        for (let i = 0; i < particleCount; i++) {
            const angle = (i / particleCount) * Math.PI * 2;
            const radius = 2.5 + Math.random() * 0.5;
            positions[i * 3] = Math.cos(angle) * radius;
            positions[i * 3 + 1] = (Math.random() - 0.5) * 3;
            positions[i * 3 + 2] = Math.sin(angle) * radius;
        }

        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

        const particlesMaterial = new THREE.PointsMaterial({
            color: 0xf39c12,
            size: 0.05,
            transparent: true,
            opacity: 0.6,
            blending: THREE.AdditiveBlending
        });

        const particles = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particles);
    }

    function animate() {
        animationId = requestAnimationFrame(animate);

        if (mesh) {
            mesh.rotation.x += 0.005;
            mesh.rotation.y += 0.01;
        }

        if (controls) {
            controls.update();
        }

        if (renderer && scene && camera) {
            renderer.render(scene, camera);
        }
    }

    function onWindowResize() {
        const container = document.getElementById('threeCanvas');
        if (!container) return;

        const width = container.parentElement.clientWidth;
        const height = container.parentElement.clientHeight;

        camera.aspect = width / height;
        camera.updateProjectionMatrix();
        renderer.setSize(width, height);
    }

    function cleanup3DScene() {
        if (animationId) {
            cancelAnimationFrame(animationId);
        }
        if (renderer) {
            renderer.dispose();
        }
        window.removeEventListener('resize', onWindowResize);
    }

    const style = document.createElement('style');
    style.textContent = `
        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(400px);
                opacity: 0;
            }
        }
    `;
    document.head.appendChild(style);

    // 页面加载完成后初始化
    window.addEventListener('DOMContentLoaded', () => {
        init3DScene();
        fetchDetail();
        loadStrategies();
    });

    // 页面卸载时清理
    window.addEventListener('beforeunload', () => {
        cleanup3DScene();
    });
</script>
</body>
</html>
