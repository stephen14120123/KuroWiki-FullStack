<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>终端中心 - 个人档案</title>
    <link rel="stylesheet" href="css/common.css">
    <style>
        /* 背景光圈 */
        #ambient-light {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 0;
            background: radial-gradient(
                600px circle at var(--mouse-x) var(--mouse-y),
                rgba(243, 156, 18, 0.08),
                transparent 50%
            );
            transition: background 0.1s ease;
        }

        /* 页面容器 */
        .profile-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        /* 页面标题 */
        .page-title {
            text-align: center;
            color: var(--primary-color);
            margin: 60px 0 20px;
            font-size: 42px;
            font-weight: 300;
            letter-spacing: 3px;
            text-shadow: 0 0 30px rgba(243, 156, 18, 0.3);
            animation: fadeInDown 0.6s ease-out;
        }

        .page-subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            letter-spacing: 2px;
            margin-bottom: 50px;
            animation: fadeInUp 0.6s ease-out 0.1s both;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 用户信息卡片 */
        .user-profile-card {
            background: rgba(22, 22, 22, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(243, 156, 18, 0.2);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 50px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 30px;
            animation: fadeInUp 0.6s ease-out 0.2s both;
            position: relative;
            overflow: hidden;
        }

        .user-profile-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--primary-color), transparent);
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(243, 156, 18, 0.2) 0%, rgba(230, 126, 34, 0.1) 100%);
            border: 3px solid var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 0 30px rgba(243, 156, 18, 0.3);
            flex-shrink: 0;
        }

        .user-info {
            flex: 1;
        }

        .user-info h1 {
            margin: 0 0 10px 0;
            color: #fff;
            font-size: 32px;
            font-weight: 300;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-info p {
            margin: 0;
            color: #aaa;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .admin-tag {
            display: inline-block;
            background: linear-gradient(135deg, #c0392b 0%, #a93226 100%);
            color: white;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            border: 1px solid #e74c3c;
            box-shadow: 0 3px 10px rgba(231, 76, 60, 0.3);
        }

        .admin-link {
            display: inline-block;
            margin-top: 15px;
            background: linear-gradient(135deg, #c0392b 0%, #a93226 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 13px;
            border: 1px solid #e74c3c;
            transition: all 0.3s ease;
        }

        .admin-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
        }

        /* 区域标题 */
        .section-title {
            font-size: 24px;
            color: var(--primary-color);
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(243, 156, 18, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            animation: fadeInUp 0.6s ease-out 0.3s both;
        }

        /* 攻略卡片容器 */
        .strategies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 30px;
            margin-bottom: 80px;
        }

        /* 流光攻略卡片 */
        .strategy-glow-card {
            position: relative;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 1px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            animation: fadeInUp 0.6s ease-out both;
            cursor: default;
        }

        .strategy-glow-card:nth-child(1) { animation-delay: 0.4s; }
        .strategy-glow-card:nth-child(2) { animation-delay: 0.45s; }
        .strategy-glow-card:nth-child(3) { animation-delay: 0.5s; }
        .strategy-glow-card:nth-child(n+4) { animation-delay: 0.55s; }

        .strategy-glow-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.7);
        }

        .strategy-glow-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(
                600px circle at var(--card-mouse-x) var(--card-mouse-y),
                rgba(243, 156, 18, 0.4),
                transparent 60%
            );
            opacity: 0;
            transition: opacity 0.4s ease-out;
            z-index: 0;
        }

        .strategies-grid:hover .strategy-glow-card::before {
            opacity: 1;
        }

        .strategy-card-inner {
            position: relative;
            background: var(--bg-card);
            border-radius: 15px;
            padding: 25px;
            z-index: 1;
            min-height: 200px;
            display: flex;
            flex-direction: column;
        }

        .strategy-card-inner::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(
                400px circle at var(--card-mouse-x) var(--card-mouse-y),
                rgba(255, 255, 255, 0.04),
                transparent 45%
            );
            z-index: -1;
            pointer-events: none;
            border-radius: 15px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
            gap: 15px;
        }

        .card-title-area {
            flex: 1;
            min-width: 0;
        }

        .card-title {
            font-size: 20px;
            color: var(--primary-color);
            font-weight: bold;
            margin: 0 0 10px 0;
            word-wrap: break-word;
        }

        .char-tag {
            display: inline-block;
            background: rgba(52, 152, 219, 0.15);
            color: #3498db;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 13px;
            border: 1px solid rgba(52, 152, 219, 0.3);
            backdrop-filter: blur(5px);
        }

        .delete-btn {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(231, 76, 60, 0.3);
            flex-shrink: 0;
        }

        .delete-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(231, 76, 60, 0.5);
        }

        .delete-btn:active {
            transform: translateY(0);
        }

        .card-content {
            color: #ccc;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 15px;
            flex: 1;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #666;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card-footer span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
            font-style: italic;
            animation: fadeInUp 0.6s ease-out 0.4s both;
        }

        .empty-state::before {
            content: '📝';
            display: block;
            font-size: 60px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        /* 加载状态 */
        .loading-state {
            text-align: center;
            padding: 40px;
            color: #666;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .page-title {
                font-size: 32px;
                margin-top: 40px;
            }

            .user-profile-card {
                flex-direction: column;
                text-align: center;
                padding: 30px 20px;
            }

            .user-info h1 {
                font-size: 24px;
                justify-content: center;
            }

            .strategies-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .card-header {
                flex-direction: column;
                align-items: stretch;
            }

            .delete-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div id="ambient-light"></div>

<nav class="top-nav">
    <a href="index.html">✦ 角色库</a>
    <a href="weapons.html">⚔️ 武器库</a>
    <a href="echoes.html">🔮 声骸库</a>
</nav>

<div id="userBar">
    <a href="login.html" style="color: var(--primary-color); text-decoration: none; font-weight: bold;">🔑 漂泊者登录</a>
</div>

<div class="profile-wrapper">
    <h1 class="page-title">✦ 终端中心 ✦</h1>
    <p class="page-subtitle">个人档案 · 数据同步</p>

    <!-- 用户信息卡片 -->
    <div class="user-profile-card">
        <div class="avatar">👤</div>
        <div class="user-info">
            <h1 id="nickname">
                <span>加载中...</span>
            </h1>
            <p>终端认证漂泊者 | 档案库贡献者</p>
            <div id="adminArea"></div>
        </div>
    </div>

    <!-- 攻略列表区域 -->
    <h2 class="section-title">📚 我发布的攻略记录</h2>
    <div class="strategies-grid" id="myStrategyList">
        <p class="loading-state">正在同步数据...</p>
    </div>
</div>

<script src="js/common.js"></script>
<script>
    // 鼠标移动事件 - 背景光圈
    const throttledMouseMove = throttle((e) => {
        const ambient = document.getElementById('ambient-light');
        if (ambient) {
            ambient.style.setProperty('--mouse-x', `${e.clientX}px`);
            ambient.style.setProperty('--mouse-y', `${e.clientY}px`);
        }
    }, 16);

    // 卡片流光效果
    const throttledCardMouseMove = throttle((e) => {
        const cards = document.querySelectorAll('.strategy-glow-card');
        cards.forEach(card => {
            const rect = card.getBoundingClientRect();
            card.style.setProperty('--card-mouse-x', `${e.clientX - rect.left}px`);
            card.style.setProperty('--card-mouse-y', `${e.clientY - rect.top}px`);
        });
    }, 16);

    window.addEventListener('mousemove', throttledMouseMove);

    const strategiesGrid = document.getElementById('myStrategyList');
    if (strategiesGrid) {
        strategiesGrid.addEventListener('mousemove', throttledCardMouseMove);
    }

    // 1. 获取当前登录用户信息
    async function loadUserInfo() {
        try {
            const token = TokenManager.getToken();
            if (!token) {
                throw new Error("未登录");
            }

            const response = await fetch('/api/user/info', {
                headers: { 'Authorization': 'Bearer ' + token }
            });

            if (response.status === 401) {
                TokenManager.clearToken();
                throw new Error("登录已过期");
            }

            const result = await response.json();

            // 兼容不同的返回格式
            let user = null;
            if (result.code === 200 && result.data) {
                user = result.data;
            } else if (result.nickname) {
                user = result;
            }

            if (user && user.nickname) {
                // 使用安全的方式更新用户名
                const nicknameSpan = document.createElement('span');
                nicknameSpan.textContent = user.nickname;
                
                const nicknameElement = document.getElementById('nickname');
                nicknameElement.innerHTML = '';
                nicknameElement.appendChild(nicknameSpan);

                if (user.role === 1) {
                    const adminTag = document.createElement('span');
                    adminTag.className = 'admin-tag';
                    adminTag.textContent = '管理员';
                    nicknameElement.appendChild(adminTag);

                    const adminLink = document.createElement('a');
                    adminLink.href = 'admin.html';
                    adminLink.className = 'admin-link';
                    adminLink.textContent = '🛡️ 进入后台管理系统';
                    document.getElementById('adminArea').appendChild(adminLink);
                }

                // 更新顶部用户栏
                updateUserBar(user);
                
                // 加载攻略列表
                loadMyStrategies();
            } else {
                throw new Error("未登录");
            }
        } catch (error) {
            console.error('用户信息加载失败:', error);
            showToast("⚠️ 终端验证失败，请先登录！", "error");
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 1500);
        }
    }

    // 2. 获取我的攻略列表
    async function loadMyStrategies() {
        try {
            const token = TokenManager.getToken();
            const response = await fetch('/api/user/myStrategies', {
                headers: { 'Authorization': 'Bearer ' + token }
            });

            if (response.status === 401) {
                TokenManager.clearToken();
                showToast("登录已过期，请重新登录", "error");
                setTimeout(() => window.location.href = 'login.html', 1500);
                return;
            }

            const data = await response.json();

            if (data.error === 'nologin') {
                window.location.href = 'login.html';
                return;
            }

            const listDiv = document.getElementById('myStrategyList');
            listDiv.innerHTML = '';

            if (!data || data.length === 0) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'empty-state';
                emptyDiv.textContent = '你还没有发布过任何攻略，快去图鉴里分享你的见解吧！';
                listDiv.appendChild(emptyDiv);
                return;
            }

            data.forEach(item => {
                const date = new Date(item.createTime).toLocaleString();
                
                // 创建卡片
                const card = document.createElement('div');
                card.className = 'strategy-glow-card';

                const cardInner = document.createElement('div');
                cardInner.className = 'strategy-card-inner';

                // 卡片头部
                const cardHeader = document.createElement('div');
                cardHeader.className = 'card-header';

                const titleArea = document.createElement('div');
                titleArea.className = 'card-title-area';

                const title = document.createElement('p');
                title.className = 'card-title';
                title.textContent = item.title;

                const charTag = document.createElement('span');
                charTag.className = 'char-tag';
                charTag.textContent = `# ${item.characterName}`;

                titleArea.appendChild(title);
                titleArea.appendChild(charTag);

                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-btn';
                deleteBtn.textContent = '删除';
                deleteBtn.onclick = () => deleteMyPost(item.id);

                cardHeader.appendChild(titleArea);
                cardHeader.appendChild(deleteBtn);

                // 卡片内容
                const content = document.createElement('p');
                content.className = 'card-content';
                content.textContent = item.content;

                // 卡片底部
                const footer = document.createElement('div');
                footer.className = 'card-footer';

                const timeSpan = document.createElement('span');
                timeSpan.innerHTML = `📅 ${date}`;

                const viewsSpan = document.createElement('span');
                viewsSpan.innerHTML = `👁️ ${item.views || 0} 次浏览`;

                footer.appendChild(timeSpan);
                footer.appendChild(viewsSpan);

                // 组装卡片
                cardInner.appendChild(cardHeader);
                cardInner.appendChild(content);
                cardInner.appendChild(footer);
                card.appendChild(cardInner);

                listDiv.appendChild(card);
            });
        } catch (error) {
            console.error('获取攻略失败:', error);
            showToast('获取攻略列表失败', 'error');
        }
    }

    // 3. 删除攻略逻辑
    async function deleteMyPost(strategyId) {
        if (!confirm("确定要永久抹除这条攻略档案吗？")) return;

        try {
            const token = TokenManager.getToken();
            const response = await fetch(`/api/strategy/delete?id=${strategyId}`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });

            if (response.status === 401) {
                TokenManager.clearToken();
                showToast("登录已过期，请重新登录", "error");
                setTimeout(() => window.location.href = 'login.html', 1500);
                return;
            }

            const result = await response.text();

            if (result === 'success') {
                showToast("💥 抹除成功！", "success");
                loadMyStrategies(); // 重新加载列表
            } else {
                showToast("删除失败，请稍后重试", "error");
            }
        } catch (error) {
            console.error("删除出错:", error);
            showToast("删除失败，请检查网络连接", "error");
        }
    }

    // 页面初始化
    (async function init() {
        await loadUserInfo();
    })();
</script>

</body>
</html>
