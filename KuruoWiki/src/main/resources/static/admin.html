<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>核心控制台 - KuroWiki</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* ==========================================
           Bootstrap 变量覆盖 - 核心主题色替换
           ========================================== */
        :root {
            /* KuruoWiki 核心色系 */
            --primary-color: #f39c12;
            --primary-dark: #e67e22;
            --primary-light: #f1c40f;
            
            /* Bootstrap 变量覆盖 */
            --bs-primary: #f39c12;
            --bs-primary-rgb: 243, 156, 18;
            --bs-link-color: #f39c12;
            --bs-link-hover-color: #e67e22;
            --bs-warning: #f39c12;
            --bs-warning-rgb: 243, 156, 18;
            
            /* 暗黑色系 */
            --sidebar-bg: rgba(22, 22, 22, 0.7);
            --sidebar-hover: rgba(243, 156, 18, 0.1);
            --main-bg: #0a0a0f;
            --card-bg: rgba(22, 22, 22, 0.7);
            --modal-bg: rgba(30, 30, 46, 0.95);
            --border-color: rgba(243, 156, 18, 0.2);
            --border-subtle: rgba(255, 255, 255, 0.05);
            
            /* 文字色系 */
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --text-muted: #999999;
        }

        /* ==========================================
           全局基础样式
           ========================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0f0f1e 100%);
            color: var(--text-secondary);
            font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
            overflow-x: hidden;
            position: relative;
        }

        /* 赛博朋克网格背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(243, 156, 18, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(243, 156, 18, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        /* ==========================================
           顶部导航栏 - 玻璃拟态
           ========================================== */
        .navbar {
            background: rgba(22, 22, 22, 0.7) !important;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            z-index: 1000;
        }

        .navbar-brand {
            font-weight: 300;
            font-size: 20px;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
        }

        .navbar-text {
            color: var(--text-secondary) !important;
        }

        .btn-outline-warning {
            color: var(--primary-color);
            border-color: var(--primary-color);
            background: transparent;
            transition: all 0.3s ease;
        }

        .btn-outline-warning:hover {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: #000;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(243, 156, 18, 0.3);
        }

        /* ==========================================
           侧边栏 - 深色玻璃拟态
           ========================================== */
        .sidebar {
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            padding-top: 70px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            width: 240px;
            border-right: 1px solid var(--border-color);
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.5);
            z-index: 999;
            overflow-y: auto;
        }

        .sidebar::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: rgba(243, 156, 18, 0.3);
            border-radius: 3px;
        }

        .sidebar::-webkit-scrollbar-thumb:hover {
            background: rgba(243, 156, 18, 0.5);
        }

        .sidebar a {
            color: var(--text-secondary);
            text-decoration: none;
            display: flex;
            align-items: center;
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
            font-size: 14px;
            position: relative;
        }

        .sidebar a::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 0;
            height: 100%;
            background: var(--sidebar-hover);
            transition: width 0.3s ease;
            z-index: -1;
        }

        .sidebar a:hover::before {
            width: 100%;
        }

        .sidebar a:hover {
            color: var(--primary-color);
            border-left-color: var(--primary-color);
        }

        .sidebar a.active {
            background: var(--sidebar-hover);
            color: var(--primary-color);
            border-left-color: var(--primary-color);
        }

        .sidebar hr {
            border-color: var(--border-subtle);
            margin: 10px 20px;
            opacity: 0.3;
        }

        /* ==========================================
           主内容区域
           ========================================== */
        .main-content {
            margin-left: 240px;
            padding: 90px 40px 40px 40px;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            animation: fadeInDown 0.6s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #pageTitle {
            font-size: 28px;
            font-weight: 300;
            color: var(--primary-color);
            margin: 0;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(243, 156, 18, 0.3);
        }

        #addBtn {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(243, 156, 18, 0.3);
            color: #000;
            font-weight: 500;
        }

        #addBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(243, 156, 18, 0.5);
        }

        /* ==========================================
           表格样式 - 深色玻璃拟态
           ========================================== */
        .table {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            margin-bottom: 0;
        }

        .table thead {
            background: rgba(243, 156, 18, 0.1);
            border-bottom: 2px solid var(--border-color);
        }

        .table thead th {
            color: var(--primary-color);
            border-bottom: 2px solid var(--border-color);
            font-weight: 500;
            padding: 15px;
            font-size: 14px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            border: none;
        }

        .table tbody tr {
            border-bottom: 1px solid var(--border-subtle);
            transition: all 0.3s ease;
        }

        .table tbody tr:hover {
            background: rgba(243, 156, 18, 0.05);
            transform: translateX(2px);
        }

        .table tbody tr:last-child {
            border-bottom: none;
        }

        .table tbody td {
            padding: 12px 15px;
            vertical-align: middle;
            border: none;
            color: var(--text-secondary);
        }

        .table-striped > tbody > tr:nth-of-type(odd) > * {
            --bs-table-accent-bg: rgba(255, 255, 255, 0.02);
            color: var(--text-secondary);
        }

        .table-hover > tbody > tr:hover > * {
            --bs-table-accent-bg: rgba(243, 156, 18, 0.05);
            color: var(--text-primary);
        }

        /* ==========================================
           按钮样式增强
           ========================================== */
        .btn {
            border-radius: 6px;
            font-weight: 500;
            transition: all 0.3s ease;
            border: none;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 13px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #2980b9 0%, #21618c 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(52, 152, 219, 0.5);
        }

        .btn-danger {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            box-shadow: 0 4px 12px rgba(231, 76, 60, 0.3);
        }

        .btn-danger:hover {
            background: linear-gradient(135deg, #c0392b 0%, #a93226 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(231, 76, 60, 0.5);
        }

        .btn-secondary {
            background: rgba(108, 117, 125, 0.8);
            backdrop-filter: blur(10px);
        }

        .btn-secondary:hover {
            background: rgba(108, 117, 125, 1);
            transform: translateY(-2px);
        }

        .btn-close {
            filter: invert(1) grayscale(100%) brightness(200%);
        }

        /* ==========================================
           Badge 徽章样式
           ========================================== */
        .badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 500;
            font-size: 12px;
        }

        .badge.bg-danger {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%) !important;
        }

        .badge.bg-secondary {
            background: rgba(108, 117, 125, 0.8) !important;
        }

        /* ==========================================
           模态框 - 深色玻璃拟态
           ========================================== */
        .modal-content {
            background: var(--modal-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
            color: var(--text-secondary);
        }

        .modal-header {
            border-bottom: 1px solid var(--border-color);
            background: rgba(243, 156, 18, 0.05);
        }

        .modal-title {
            color: var(--primary-color);
            font-weight: 300;
            letter-spacing: 1px;
        }

        .modal-footer {
            border-top: 1px solid var(--border-color);
        }

        .modal-backdrop {
            backdrop-filter: blur(5px);
        }

        /* ==========================================
           表单控件 - 深色适配
           ========================================== */
        .form-label {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .form-control,
        .form-select {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-subtle);
            color: var(--text-primary);
            border-radius: 8px;
            padding: 10px 15px;
            transition: all 0.3s ease;
        }

        .form-control::placeholder {
            color: var(--text-muted);
        }

        .form-control:focus,
        .form-select:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary-color);
            color: var(--text-primary);
            box-shadow: 0 0 0 0.2rem rgba(243, 156, 18, 0.25);
            outline: none;
        }

        .form-select option {
            background: #1a1a2e;
            color: var(--text-primary);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 100px;
        }

        /* ==========================================
           仪表盘卡片 - 流光效果
           ========================================== */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
            animation: fadeInUp 0.6s ease-out 0.2s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
            overflow: hidden;
            cursor: default;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(243, 156, 18, 0.15) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .stat-card:hover::before {
            opacity: 1;
        }

        .stat-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(243, 156, 18, 0.3);
            border-color: var(--primary-color);
        }

        .stat-icon {
            font-size: 40px;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px rgba(243, 156, 18, 0.3));
        }

        .stat-value {
            font-size: 36px;
            font-weight: bold;
            color: var(--primary-color);
            margin: 10px 0;
            text-shadow: 0 0 20px rgba(243, 156, 18, 0.5);
        }

        .stat-label {
            font-size: 14px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-trend {
            font-size: 12px;
            margin-top: 8px;
            color: #27ae60;
        }

        /* ==========================================
           响应式设计
           ========================================== */
        @media (max-width: 992px) {
            .sidebar {
                width: 200px;
            }
            .main-content {
                margin-left: 200px;
                padding: 80px 20px 20px 20px;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }
            .sidebar.show {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
                padding: 70px 15px 15px 15px;
            }
            .dashboard {
                grid-template-columns: 1fr;
            }
        }

        /* ==========================================
           加载动画
           ========================================== */
        .loading-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* ==========================================
           滚动条美化
           ========================================== */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(243, 156, 18, 0.3);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(243, 156, 18, 0.5);
        }

        /* ==========================================
           图片样式
           ========================================== */
        .table img {
            border: 1px solid var(--border-subtle);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .table img:hover {
            transform: scale(1.5);
            box-shadow: 0 4px 15px rgba(243, 156, 18, 0.3);
            border-color: var(--primary-color);
            z-index: 10;
            position: relative;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark fixed-top">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">✦ KuroWiki 核心控制台</a>
        <div class="d-flex align-items-center">
            <span class="navbar-text me-3" id="adminName" style="color: #ccc;">Loading...</span>
            <button class="btn btn-outline-warning btn-sm" onclick="logout()">🚪 退出登录</button>
        </div>
    </div>
</nav>

<div class="sidebar" id="sidebar">
    <a onclick="loadDashboard()" id="nav-dashboard">
        <span>📊 数据仪表盘</span>
    </a>
    <a onclick="loadUsers()" id="nav-users">
        <span>👤 用户管理</span>
    </a>
    <a onclick="loadStrategies()" id="nav-strategies">
        <span>📚 攻略管理</span>
    </a>
    <a onclick="loadCharacters()" id="nav-characters">
        <span>✨ 角色图鉴管理</span>
    </a>
    <a onclick="loadWeapons()" id="nav-weapons">
        <span>⚔️ 武器图鉴管理</span>
    </a>
    <a onclick="loadEchoes()" id="nav-echoes">
        <span>🔮 声骸图鉴管理</span>
    </a>
    <hr>
    <a href="/">
        <span>🏠 返回前台首页</span>
    </a>
</div>

<div class="main-content">
    <div class="header-actions">
        <h2 id="pageTitle">数据仪表盘</h2>
        <button id="addBtn" class="btn btn-warning" style="display: none;" onclick="openAddModal()">
            ＋ 新增记录
        </button>
    </div>

    <div id="tableContainer">
        <!-- 仪表盘内容将在这里动态加载 -->
        <div class="dashboard">
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-value" id="totalUsers">-</div>
                <div class="stat-label">总用户数</div>
                <div class="stat-trend">↑ 加载中...</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">✨</div>
                <div class="stat-value" id="totalCharacters">-</div>
                <div class="stat-label">角色总数</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📚</div>
                <div class="stat-value" id="totalStrategies">-</div>
                <div class="stat-label">攻略总数</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📈</div>
                <div class="stat-value" id="todayNew">-</div>
                <div class="stat-label">今日新增</div>
            </div>
        </div>
        <p style="color: #666; text-align: center; padding: 20px;">点击左侧菜单查看详细数据</p>
    </div>
</div>

<div class="modal fade" id="dataModal" tabindex="-1" aria-labelledby="dataModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="dataModalLabel">编辑数据</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="modalBody">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveData()">保存</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    let currentModule = ''; // 记录当前在哪个模块 (users, strategies, characters, weapons, echoes)
    let modalInstance = null; // Bootstrap modal 实例

    // 获取 Token 的辅助方法
    function getToken() {
        return localStorage.getItem('jwt_token') || '';
    }

    // --- 页面初始化与权限验证 ---
    window.onload = function() {
        modalInstance = new bootstrap.Modal(document.getElementById('dataModal'));

        // 发起请求时带上 headers
        fetch('/api/user/info', {
            headers: { 'Authorization': 'Bearer ' + getToken() }
        })
            .then(res => res.json())
            .then(data => {
                let user = null;
                if (data.code === 200 && data.data) user = data.data;
                else if (data.nickname) user = data;

                if (user && user.role === 1) {
                    document.getElementById('adminName').innerText = '管理员: ' + user.nickname;
                    loadDashboard(); // 默认加载仪表盘
                } else {
                    alert('未登录或权限不足！将跳转到首页。');
                    window.location.href = '/';
                }
            })
            .catch(err => {
                alert('请先登录！');
                window.location.href = '/login.html';
            });
    }

    // 更新侧边栏高亮状态
    function setActiveNav(id) {
        document.querySelectorAll('#sidebar a').forEach(a => a.classList.remove('active'));
        if(id) document.getElementById(id).classList.add('active');
    }

    // ==========================================
    // 0. 数据仪表盘
    // ==========================================
    function loadDashboard() {
        currentModule = 'dashboard';
        setActiveNav('nav-dashboard');
        document.getElementById('pageTitle').innerText = '数据仪表盘';
        document.getElementById('addBtn').style.display = 'none';
        
        document.getElementById('tableContainer').innerHTML = `
            <div class="dashboard">
                <div class="stat-card">
                    <div class="stat-icon">👥</div>
                    <div class="stat-value" id="totalUsers">-</div>
                    <div class="stat-label">总用户数</div>
                    <div class="stat-trend" id="userTrend">加载中...</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">✨</div>
                    <div class="stat-value" id="totalCharacters">-</div>
                    <div class="stat-label">角色总数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📚</div>
                    <div class="stat-value" id="totalStrategies">-</div>
                    <div class="stat-label">攻略总数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">⚔️</div>
                    <div class="stat-value" id="totalWeapons">-</div>
                    <div class="stat-label">武器总数</div>
                </div>
            </div>
            <div style="margin-top: 30px; padding: 20px; background: rgba(30, 30, 46, 0.6); border-radius: 15px; border: 1px solid rgba(243, 156, 18, 0.2);">
                <h4 style="color: var(--primary-color); margin-bottom: 20px;">📈 系统概览</h4>
                <p style="color: #999;">系统运行正常，所有服务在线</p>
                <p style="color: #999;">最后更新时间：${new Date().toLocaleString()}</p>
            </div>
        `;

        // 加载统计数据
        loadStats();
    }

    async function loadStats() {
        try {
            // 获取用户数
            const usersRes = await fetch('/api/admin/users', {
                headers: { 'Authorization': 'Bearer ' + getToken() }
            });
            const usersData = await usersRes.json();
            if (usersData.code === 200) {
                document.getElementById('totalUsers').textContent = usersData.data.length;
            }

            // 获取角色数
            const charsRes = await fetch('/api/admin/characters', {
                headers: { 'Authorization': 'Bearer ' + getToken() }
            });
            const charsData = await charsRes.json();
            if (charsData) {
                document.getElementById('totalCharacters').textContent = charsData.length;
            }

            // 获取攻略数
            const strategiesRes = await fetch('/api/admin/strategies', {
                headers: { 'Authorization': 'Bearer ' + getToken() }
            });
            const strategiesData = await strategiesRes.json();
            if (strategiesData.code === 200) {
                document.getElementById('totalStrategies').textContent = strategiesData.data.length;
            }

            // 获取武器数
            const weaponsRes = await fetch('/api/admin/weapons', {
                headers: { 'Authorization': 'Bearer ' + getToken() }
            });
            const weaponsData = await weaponsRes.json();
            if (weaponsData) {
                document.getElementById('totalWeapons').textContent = weaponsData.length;
            }
        } catch (error) {
            console.error('加载统计数据失败', error);
        }
    }

    // ==========================================
    // 1. 用户管理模块
    // ==========================================
    function loadUsers() {
        currentModule = 'users';
        setActiveNav('nav-users');
        document.getElementById('pageTitle').innerText = '用户管理';
        document.getElementById('addBtn').style.display = 'none';
        document.getElementById('tableContainer').innerHTML = '<p>加载中...</p>';

        fetch('/api/admin/users', {
            headers: { 'Authorization': 'Bearer ' + getToken() }
        }).then(res => res.json()).then(data => {
            if(data.code !== 200) return alert(data.message);
            let html = `
                <table class="table table-striped table-hover">
                    <thead><tr><th>ID</th><th>用户名</th><th>昵称</th><th>角色</th><th>创建时间</th><th>操作</th></tr></thead>
                    <tbody>
            `;
            data.data.forEach(u => {
                let roleStr = u.role === 1 ? '<span class="badge bg-danger">管理员</span>' : '<span class="badge bg-secondary">普通用户</span>';
                let dateStr = new Date(u.createTime).toLocaleString();
                html += `
                    <tr>
                        <td>${u.id}</td><td>${u.username}</td><td>${u.nickname}</td><td>${roleStr}</td><td>${dateStr}</td>
                        <td>${u.role !== 1 ? `<button class="btn btn-sm btn-danger" onclick="deleteUser(${u.id})">封禁/删除</button>` : '---'}</td>
                    </tr>`;
            });
            html += '</tbody></table>';
            document.getElementById('tableContainer').innerHTML = html;
        });
    }

    function deleteUser(id) {
        if(!confirm('确定要删除该用户吗？此操作不可逆！')) return;
        fetch('/api/admin/user/delete', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
                'Authorization': 'Bearer ' + getToken()
            },
            body: 'userId=' + id
        })
            .then(res => res.json()).then(data => { alert(data.message); if(data.code === 200) loadUsers(); });
    }

    // ==========================================
    // 2. 攻略管理模块
    // ==========================================
    function loadStrategies() {
        currentModule = 'strategies';
        setActiveNav('nav-strategies');
        document.getElementById('pageTitle').innerText = '攻略管理';
        document.getElementById('addBtn').style.display = 'none';
        document.getElementById('tableContainer').innerHTML = '<p>加载中...</p>';

        fetch('/api/admin/strategies', {
            headers: { 'Authorization': 'Bearer ' + getToken() }
        }).then(res => res.json()).then(data => {
            if(data.code !== 200) return alert(data.message);
            let html = `
                <table class="table table-striped table-hover">
                    <thead><tr><th>ID</th><th>角色</th><th>标题</th><th>作者</th><th>发布时间</th><th>操作</th></tr></thead>
                    <tbody>
            `;
            data.data.forEach(s => {
                let dateStr = new Date(s.createTime).toLocaleString();
                html += `
                    <tr>
                        <td>${s.id}</td><td>${s.characterName || 'N/A'}</td><td>${s.title}</td><td>${s.authorName || 'N/A'}</td><td>${dateStr}</td>
                        <td><button class="btn btn-sm btn-danger" onclick="deleteStrategy(${s.id})">强制删除</button></td>
                    </tr>`;
            });
            html += '</tbody></table>';
            document.getElementById('tableContainer').innerHTML = html;
        });
    }

    function deleteStrategy(id) {
        if(!confirm('确定要强制删除这条攻略吗？')) return;
        fetch('/api/admin/strategy/delete', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
                'Authorization': 'Bearer ' + getToken()
            },
            body: 'strategyId=' + id
        })
            .then(res => res.json()).then(data => { alert(data.message); if(data.code === 200) loadStrategies(); });
    }

    // ==========================================
    // 3. 角色图鉴管理模块
    // ==========================================
    function loadCharacters() {
        currentModule = 'characters';
        setActiveNav('nav-characters');
        document.getElementById('pageTitle').innerText = '角色图鉴管理';
        document.getElementById('addBtn').style.display = 'inline-block';
        document.getElementById('addBtn').innerText = '＋ 新增角色';
        document.getElementById('tableContainer').innerHTML = '<p>加载中...</p>';

        fetch('/api/admin/characters', {
            headers: { 'Authorization': 'Bearer ' + getToken() }
        }).then(res => res.json()).then(data => {
            window.characterData = data;
            let html = `
                <table class="table table-striped table-hover align-middle">
                    <thead><tr><th>ID</th><th>立绘</th><th>角色名</th><th>星级</th><th>属性</th><th>操作</th></tr></thead>
                    <tbody>
            `;
            data.forEach(c => {
                let img = c.imageUrl ? `<img src="${c.imageUrl}" style="height:40px; border-radius:4px;">` : '无';
                html += `
                    <tr>
                        <td>${c.id}</td><td>${img}</td><td>${c.name}</td><td>${c.rarity}星</td><td>${c.element}</td>
                        <td>
                            <button class="btn btn-sm btn-primary" onclick="openEditModal(${c.id})">编辑</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteData('character', ${c.id})">删除</button>
                        </td>
                    </tr>`;
            });
            html += '</tbody></table>';
            document.getElementById('tableContainer').innerHTML = html;
        });
    }

    // ==========================================
    // 4. 武器图鉴管理模块
    // ==========================================
    function loadWeapons() {
        currentModule = 'weapons';
        setActiveNav('nav-weapons');
        document.getElementById('pageTitle').innerText = '武器图鉴管理';
        document.getElementById('addBtn').style.display = 'inline-block';
        document.getElementById('addBtn').innerText = '＋ 新增武器';
        document.getElementById('tableContainer').innerHTML = '<p>加载中...</p>';

        fetch('/api/admin/weapons', {
            headers: { 'Authorization': 'Bearer ' + getToken() }
        }).then(res => res.json()).then(data => {
            window.weaponData = data;
            let html = `
                <table class="table table-striped table-hover align-middle">
                    <thead><tr><th>ID</th><th>立绘</th><th>武器名</th><th>星级</th><th>类型</th><th>基础攻击</th><th>操作</th></tr></thead>
                    <tbody>
            `;
            data.forEach(w => {
                let img = w.imageUrl ? `<img src="${w.imageUrl}" style="height:40px; border-radius:4px;">` : '无';
                html += `
                    <tr>
                        <td>${w.id}</td><td>${img}</td><td>${w.name}</td><td>${w.rarity}星</td><td>${w.weaponType}</td><td>${w.baseAtk}</td>
                        <td>
                            <button class="btn btn-sm btn-primary" onclick="openEditModal(${w.id})">编辑</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteData('weapon', ${w.id})">删除</button>
                        </td>
                    </tr>`;

            html += '</tbody></table>';
            document.getElementById('tableContainer').innerHTML = html;
        });

    // ==========================================
    // 5. 声骸图鉴管理模块
    // ==========================================
    function loadEchoes() {
        currentModule = 'echoes';
        setActiveNav('nav-echoes');
        document.getElementById('pageTitle').innerText = '声骸图鉴管理';
        document.getElementById('addBtn').style.display = 'inline-block';
        document.getElementById('addBtn').innerText = '＋ 新增声骸';
        document.getElementById('tableContainer').innerHTML = '<p>加载中...</p>';

        fetch('/api/admin/echoes', {
            headers: { 'Authorization': 'Bearer ' + getToken() }
        }).then(res => res.json()).then(data => {
            window.echoData = data;
            let html = `
                <table class="table table-striped table-hover align-middle">
                    <thead><tr><th>ID</th><th>立绘</th><th>声骸名</th><th>COST</th><th>合鸣属性</th><th>操作</th></tr></thead>
                    <tbody>
            `;
            data.forEach(e => {
                let img = e.imageUrl ? `<img src="${e.imageUrl}" style="height:40px; border-radius:4px;">` : '无';
                html += `
                    <tr>
                        <td>${e.id}</td><td>${img}</td><td>${e.name}</td><td>${e.cost}</td><td>${e.sonataEffect}</td>
                        <td>
                            <button class="btn btn-sm btn-primary" onclick="openEditModal(${e.id})">编辑</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteData('echo', ${e.id})">删除</button>
                        </td>
                    </tr>`;
            });
            html += '</tbody></table>';
            document.getElementById('tableContainer').innerHTML = html;
        });
    }

    // ==========================================
    // 核心表单与提交逻辑
    // ==========================================
    function openAddModal() {
        document.getElementById('dataModalLabel').innerText = `新增 ${getModuleName()}`;
        renderForm(null);
        modalInstance.show();
    }

    function openEditModal(id) {
        document.getElementById('dataModalLabel').innerText = `编辑 ${getModuleName()}`;
        let dataObj = null;
        if(currentModule === 'characters') dataObj = window.characterData.find(item => item.id === id);
        if(currentModule === 'weapons') dataObj = window.weaponData.find(item => item.id === id);
        if(currentModule === 'echoes') dataObj = window.echoData.find(item => item.id === id);

        renderForm(dataObj);
        modalInstance.show();
    }

    function getModuleName() {
        if(currentModule === 'characters') return '角色';
        if(currentModule === 'weapons') return '武器';
        if(currentModule === 'echoes') return '声骸';
        return '';
    }

    // 动态渲染表单结构
    function renderForm(data) {
        let html = `<form id="dataForm"><input type="hidden" name="id" value="${data ? data.id : ''}">`;

        if (currentModule === 'characters') {
            html += `
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">角色名称</label>
                        <input type="text" class="form-control" name="name" value="${data ? data.name : ''}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">星级</label>
                        <select class="form-select" name="rarity">
                            <option value="5" ${data && data.rarity==5 ? 'selected':''}>5星</option>
                            <option value="4" ${data && data.rarity==4 ? 'selected':''}>4星</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">属性 (如:衍射/热熔)</label>
                        <input type="text" class="form-control" name="element" value="${data ? data.element : ''}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">武器类型 (如:长刃/迅刀)</label>
                        <input type="text" class="form-control" name="weaponType" value="${data ? data.weaponType : ''}" required>
                    </div>
                    <div class="col-md-12 mb-3">
                        <label class="form-label">立绘图片 URL</label>
                        <input type="text" class="form-control" name="imageUrl" value="${data ? data.imageUrl : 'images/default_char.png'}">
                    </div>
                    <div class="col-md-12 mb-3">
                        <label class="form-label">技能描述</label>
                        <textarea class="form-control" name="description" rows="3">${data ? data.description : ''}</textarea>
                    </div>
                    <div class="col-md-3 mb-2"><label class="form-label">生命值 (HP)</label><input type="number" class="form-control" name="hp" value="${data ? data.hp : 0}"></div>
                    <div class="col-md-3 mb-2"><label class="form-label">攻击力 (ATK)</label><input type="number" class="form-control" name="atk" value="${data ? data.atk : 0}"></div>
                    <div class="col-md-3 mb-2"><label class="form-label">防御力 (DEF)</label><input type="number" class="form-control" name="def" value="${data ? data.def : 0}"></div>
                    <div class="col-md-3 mb-2"><label class="form-label">暴击率 (CRIT)</label><input type="number" class="form-control" name="crit" value="${data ? data.crit : 0}"></div>
                    <div class="col-md-3 mb-2"><label class="form-label">能量 (Energy)</label><input type="number" class="form-control" name="energy" value="${data ? data.energy : 0}"></div>
                </div>
            `;
        }
        else if (currentModule === 'weapons') {
            html += `
                <div class="row">
                    <div class="col-md-6 mb-3"><label class="form-label">武器名称</label><input type="text" class="form-control" name="name" value="${data ? data.name : ''}" required></div>
                    <div class="col-md-6 mb-3"><label class="form-label">星级</label><input type="number" class="form-control" name="rarity" value="${data ? data.rarity : 5}"></div>
                    <div class="col-md-6 mb-3"><label class="form-label">武器类型</label><input type="text" class="form-control" name="weaponType" value="${data ? data.weaponType : ''}"></div>
                    <div class="col-md-6 mb-3"><label class="form-label">基础攻击力</label><input type="number" class="form-control" name="baseAtk" value="${data ? data.baseAtk : 0}"></div>
                    <div class="col-md-6 mb-3"><label class="form-label">副词条类型</label><input type="text" class="form-control" name="subStatType" value="${data ? data.subStatType : ''}"></div>
                    <div class="col-md-6 mb-3"><label class="form-label">副词条数值</label><input type="text" class="form-control" name="subStatValue" value="${data ? data.subStatValue : ''}"></div>
                    <div class="col-md-12 mb-3"><label class="form-label">图片 URL</label><input type="text" class="form-control" name="imageUrl" value="${data ? data.imageUrl : ''}"></div>
                    <div class="col-md-12 mb-3"><label class="form-label">技能名称</label><input type="text" class="form-control" name="skillName" value="${data ? data.skillName : ''}"></div>
                    <div class="col-md-12 mb-3"><label class="form-label">技能描述</label><textarea class="form-control" name="skillDesc" rows="3">${data ? data.skillDesc : ''}</textarea></div>
                </div>
            `;
        }
        else if (currentModule === 'echoes') {
            html += `
                <div class="row">
                    <div class="col-md-6 mb-3"><label class="form-label">声骸名称</label><input type="text" class="form-control" name="name" value="${data ? data.name : ''}" required></div>
                    <div class="col-md-6 mb-3"><label class="form-label">COST值 (1, 3, 4)</label><input type="number" class="form-control" name="cost" value="${data ? data.cost : 1}"></div>
                    <div class="col-md-12 mb-3"><label class="form-label">合鸣属性</label><input type="text" class="form-control" name="sonataEffect" value="${data ? data.sonataEffect : ''}" placeholder="如：沉日劫明, 凝夜白霜"></div>
                    <div class="col-md-12 mb-3"><label class="form-label">图片 URL</label><input type="text" class="form-control" name="imageUrl" value="${data ? data.imageUrl : ''}"></div>
                    <div class="col-md-12 mb-3"><label class="form-label">技能描述</label><textarea class="form-control" name="skillDesc" rows="4">${data ? data.skillDesc : ''}</textarea></div>
                </div>
            `;
        }
        html += '</form>';
        document.getElementById('modalBody').innerHTML = html;
    }

    // 保存数据
    function saveData() {
        const form = document.getElementById('dataForm');
        if(!form.reportValidity()) return;

        const formData = new FormData(form);
        const isUpdate = formData.get('id') !== '';
        formData.append('action', isUpdate ? 'update' : 'add');

        let apiUrl = '';
        if(currentModule === 'characters') apiUrl = '/api/admin/character';
        if(currentModule === 'weapons') apiUrl = '/api/admin/weapon';
        if(currentModule === 'echoes') apiUrl = '/api/admin/echo';

        const urlEncodedData = new URLSearchParams(formData).toString();

        fetch(apiUrl, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
                'Authorization': 'Bearer ' + getToken()
            },
            body: urlEncodedData
        })
            .then(res => res.json())
            .then(data => {
                alert(data.message);
                if(data.code === 200) {
                    modalInstance.hide();
                    if(currentModule === 'characters') loadCharacters();
                    if(currentModule === 'weapons') loadWeapons();
                    if(currentModule === 'echoes') loadEchoes();
                }
            });
    }

    // 删除数据
    function deleteData(moduleName, id) {
        if(!confirm('确定要删除这条档案吗？删除后前台将无法展示该数据！')) return;

        let apiUrl = `/api/admin/${moduleName}`;

        fetch(apiUrl, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
                'Authorization': 'Bearer ' + getToken()
            },
            body: `action=delete&id=${id}`
        })
            .then(res => res.json())
            .then(data => {
                alert(data.message);
                if(data.code === 200) {
                    if(currentModule === 'characters') loadCharacters();
                    if(currentModule === 'weapons') loadWeapons();
                    if(currentModule === 'echoes') loadEchoes();
                }
            });
    }

    // --- 退出登录 ---
    function logout() {
        fetch('/api/user/logout', {
            headers: { 'Authorization': 'Bearer ' + getToken() }
        }).then(() => {
            localStorage.removeItem('jwt_token'); // 退出时顺便清空本地的 Token
            window.location.href = '/login.html';
        });
    }
</script>

</body>
