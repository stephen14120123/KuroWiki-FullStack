server:
  port: 8088 # 保持 8088 端口不变
  # 🚨 已经移除了 context-path，让项目直接运行在根目录 (localhost:8088/)

spring:
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  datasource:
    # 切换为 Oracle 驱动
    driver-class-name: oracle.jdbc.OracleDriver
    # 填入你刚才创建的 FREEPDB1 容器地址
    url: jdbc:oracle:thin:@localhost:1521/FREEPDB1
    # 填入你刚才在黑框里敲的新用户和密码
    username: kuro
    password: kuro123

mybatis:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.wiki.entity

# Knife4j API 文档
knife4j:
  enable: true

# 文件上传配置
spring.servlet.multipart:
  max-file-size: 10MB
  max-request-size: 20MB

# 自定义：图片上传存储路径
kurowiki:
  upload:
    path: D:/kurowiki/uploads/
    url-prefix: /images/

# Redis 缓存配置
spring.redis:
  host: localhost
  port: 6379
  password:        # 无密码留空
  database: 0
  timeout: 5000ms
  lettuce:
    pool:
      max-active: 8
      max-idle: 8
      min-idle: 0

# 日志配置
logging:
  level:
    com.wiki: info
    com.wiki.aspect: info
    com.wiki.exception: warn
  file:
    name: logs/kurowiki.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"